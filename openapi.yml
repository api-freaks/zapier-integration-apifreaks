    PhoneValidationPhoneValidationResponse:
      type: object
      properties:
        raw_input:
          type: object
          description: Original request payload sent by the caller — the number, optional region, and optional dialer_region.
          properties:
            number:
              type: string
              description: The phone number as entered by the user.
              example: '+14155552671'
            region:
              type: string
              description: ISO-2 country code (e.g., US, GB). Present when provided in the request.
              example: US
            dialer_region:
              type: string
              description: ISO-2 country code of the dialing origin. Present when provided in the request.
              example: AU
        possible:
          type: boolean
          description: Whether the number is possible (length and format checks only). A number can be possible but not valid.
          example: true
        valid:
          type: boolean
          description: Whether the number is valid according to the numbering plan.
          example: true
        country_prefix:
          type: integer
          description: The international dialing prefix for the number's country (e.g., 1 for US/Canada, 44 for United Kingdom).
          example: 1
        national_number:
          type: integer
          description: The national significant number (the phone number without the country code).
          example: 4155552671
        country_code:
          type: string
          description: ISO-2 country code inferred from the number (e.g., US, GB).
          example: US
        carrier:
          type: string
          description: Carrier name associated with the number (if available). May not reflect ported carriers.
          example: Verizon
        location:
          type: string
          description: Geographic description (city/region) for the number (if applicable).
          example: San Francisco, CA
        time_zones:
          type: array
          items:
            type: string
          description: Array of possible time zones associated with the number.
          example:
          - America/Los_Angeles
        line_type:
          type: string
          description: Classification of the phone line (MOBILE, FIXED_LINE, VOIP, etc.).
          enum:
          - MOBILE
          - FIXED_LINE
          - FIXED_LINE_OR_MOBILE
          - VOIP
          - TOLL_FREE
          - PREMIUM_RATE
          - SHARED_COST
          - PERSONAL_NUMBER
          - PAGER
          - UAN
          - VOICEMAIL
          - UNKNOWN
          example: FIXED_LINE_OR_MOBILE
        formats:
          type: object
          description: Four standardized representations of the number — E.164, International, National, and RFC3966 (returned for valid numbers only).
          properties:
            E164:
              type: string
              description: Number in E.164 format, the standard machine-readable format used for storage and APIs.
              example: '+14155552671'
            International:
              type: string
              description: Human-readable international format with country code, spaces, and punctuation.
              example: +1 415-555-2671
            National:
              type: string
              description: Local format as dialed within the country, without the country code.
              example: (415) 555-2671
            RFC3966:
              type: string
              description: 'URI format following RFC 3966, used for tel: links in HTML and SIP/VoIP applications.'
              example: tel:+1-415-555-2671
        area_code_length:
          type: integer
          description: Length of the geographic area code. Only applies to geographically-assigned numbers.
          example: 3
        ndc_length:
          type: integer
          description: Length of the National Destination Code (NDC), the routing prefix within a country.
          example: 3
        can_be_internationally_dialled:
          type: boolean
          description: Whether the number can be dialled internationally. false for short codes, emergency numbers, and domestic-only services.
          example: true
    PhoneValidationBulkPhoneValidationResponse:
      type: array
      description: Array of per-number validation results, one entry for each phone number in the request.
      items:
        $ref: '#/components/schemas/PhoneValidationPhoneValidationResponse'
    PhoneValidationErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the error occurred.
          example: '2026-03-16T22:07:42.176Z'
        path:
          type: string
          description: The API path that was called.
          example: /v1.0/phone/validation
        status:
          type: integer
          description: HTTP status code.
          example: 400
        error:
          type: string
          description: Short error title.
          example: Bad Request
        message:
          type: string
          description: Error message describing what went wrong.
          example: The 'number' is required in Post Body and cannot be empty.
    WebScrapingJsEnabledTrueBody:
      type: object
      properties:
        blockUrl:
          type: array
          items:
            type: string
          description: List of script or URL patterns to block during network requests.
        cookies:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
            required:
            - name
            - value
          description: List of cookies to be set in the browser session.
        instructions:
          type: array
          description: An ordered list of step-by-step scraping instructions to be executed in the browser.
          items:
            type: object
            oneOf:
            - title: Fill action
              description: Fills an input field with a value using a CSS or XPath selector.
              properties:
                fill:
                  type: object
                  properties:
                    place:
                      type: string
                    value:
                      type: string
                  required:
                  - place
                  - value
            - title: Click action
              description: Clicks an element on the page using XPath or CSS selector.
              properties:
                click:
                  type: string
            - title: Click if exists action
              description: Clicks the target element only if it appears on the page within a short timeout.
              properties:
                clickIfExist:
                  type: string
            - title: Enter key action
              description: Sends an Enter keystroke to the targeted element.
              properties:
                enter:
                  type: string
            - title: New tab action
              description: Switches focus to a newly opened browser tab.
              properties:
                newTab:
                  type: boolean
            - title: Move to relative tab action
              description: Moves between tabs using a relative index from the current tab.
              properties:
                moveToRelativeTab:
                  type: integer
            - title: Wait action
              description: Pauses execution for the specified number of milliseconds.
              properties:
                wait:
                  type: integer
                  description: Wait time in milliseconds.
            - title: Wait for element action
              description: Waits until an element matching the selector becomes visible on the page.
              properties:
                waitFor:
                  type: string
            - title: Select dropdown action
              description: Selects an option from a dropdown element by selector and matching value.
              properties:
                select:
                  type: object
                  properties:
                    place:
                      type: string
                    value:
                      type: string
                  required:
                  - place
                  - value
            - title: Execute JavaScript action
              description: Executes a custom JavaScript snippet inside the page context.
              properties:
                jsExe:
                  type: string
            - title: Conditional check action
              description: Executes conditional logic steps based on element state using `if-<method>` and `else-<method>` keys.
              properties:
                conditionalCheck:
                  type: array
                  items:
                    type: object
                    description: Supports if-<method> and else-<method> keys with conditions.
            - title: Click button by value action
              description: Clicks a button that matches a specific text or value attribute.
              properties:
                clickButtonByValue:
                  type: object
                  properties:
                    place:
                      type: string
                    value:
                      type: string
                  required:
                  - place
                  - value
            - title: Image captcha solver action
              description: Provides instructions for solving image-based captchas using a selected model.
              properties:
                generalImageCaptcha:
                  type: array
                  items:
                    type: object
                    properties:
                      imagePath:
                        type: string
                      textField:
                        type: string
                      imageUpdatePath:
                        type: string
                      captchaFailedPath:
                        type: string
                      model:
                        type: string
                        enum:
                        - Model_1
                        - Model_2
                        - Model_3
                        - Model_4
                        - Model_5
                        - Model_6
                        - basicTnImageProcessing
                        - basicPhImageProcessing
                  description: Instructions for solving image captchas.
            - title: Block element action
              description: List of CSS selectors or XPaths for elements to block or hide on the page.
              properties:
                blockElement:
                  type: array
                  description: List of CSS selectors or XPaths for elements to block or hide on the page.
                  items:
                    type: string
                  example:
                  - .description
                  - //input[@id='username']
            - title: Extract data action
              description: Defines what data to extract and how to extract it (HTML, text, or user data).
              properties:
                extract:
                  type: object
                  description: Defines what data to extract and how to extract it.
                  properties:
                    html:
                      type: string
                      description: 'CSS selector or XPath to extract HTML content. Example: "/html/body"'
                    text:
                      type: string
                      description: 'CSS selector or XPath to extract text content. Example: "/html/body/div/div[2]/text"'
                    user_data:
                      type: string
                      description: 'CSS selector or XPath to extract user data. Example: "/html/body/div/div[2]"'
            - title: Fill image captcha action
              description: Captures and fills image-based captcha values automatically.
              properties:
                fillImageCaptcha:
                  type: array
                  description: Captures and fills CAPTCHA values automatically.
                  items:
                    type: object
                    properties:
                      imagePath:
                        type: string
                        description: Path or selector to the CAPTCHA image element.
                      textField:
                        type: string
                        description: Selector for the field where CAPTCHA text is entered.
                      imageUpdatePath:
                        type: string
                        description: Selector to refresh or update the CAPTCHA image.
                      captchaFailedPath:
                        type: string
                        description: Selector indicating a CAPTCHA failure so the solver can retry.
                      model:
                        type: string
                        description: Model used for CAPTCHA solving.
                        enum:
                        - Model_1
                        - Model_2
                        - Model_3
                        - Model_4
                        - Model_5
                        - Model_6
                        - basicTnImageProcessing
                        - basicPhImageProcessing
            - title: Switch to iframe action
              description: Switches the browser context into an iframe identified by name or ID.
              properties:
                switchToIframe:
                  type: string
                  description: Switches context into an iframe by name or ID.
            - title: Switch to parent frame action
              description: Returns the browser context from an iframe back to its parent frame.
              properties:
                switchToParentFrame:
                  type: boolean
                  description: Returns from an iframe to the parent context.
            - title: Resolve audio captcha action
              description: Solves audio-based captcha challenges and fills the resolved text into the target field.
              properties:
                resolveAudioCaptcha:
                  type: object
                  description: Solves audio CAPTCHA challenges.
                  properties:
                    audioPath:
                      type: string
                      description: Selector for the audio CAPTCHA element.
                    textField:
                      type: string
                      description: Selector for the field where the resolved audio CAPTCHA text is entered.
            - title: Screenshot action
              description: Captures a screenshot of the current page state. Can be a boolean-like value or a selector.
              properties:
                screenshot:
                  type: string
                  description: Captures a screenshot of the page. Can be a boolean-like value or a selector.
            - title: Save image action
              description: Saves an image from the page by CSS selector or element ID.
              properties:
                saveimage:
                  type: string
                  description: Saves an image by selector or ID.
