            offset:
              type: number
              description: Time zone offset from UTC.
              mandatory: true
            offset_with_dst:
              type: number
              description: Time zone with DST offset from UTC.
              mandatory: true
            current_time:
              type: string
              description: Current time in yyyy-MM-dd HH:mm:ss.SSS±ZZZ format.
              mandatory: true
            current_time_unix:
              type: number
              description: Current time in seconds since 1970.
              mandatory: true
            is_dst:
              type: boolean
              description: Is the time zone in daylight savings?
              mandatory: true
            dst_savings:
              type: number
              description: Total daylight savings.
              mandatory: true
            dst_exists:
              type: boolean
              description: Indicates whether Daylight Saving Time (DST) is observed in the region. If true, the dst_start and dst_end objects will include detailed DST transition information.
