openapi: 3.1.0
info:
  title: APIFreaks APIs
  description: Unified OpenAPI spec for the APIFreaks API hub, generated from the live per-category Swagger docs. Authenticate with your API key sent as the X-apiKey header. Get a free key at https://apifreaks.com/signup.
  version: 1.0.0
servers:
- url: https://api.apifreaks.com
  description: Base server
security:
- ApiKeyAuth: []
tags:
- name: Commodity
- name: Currency
- name: DNS
- name: Domain
- name: Email Validation
- name: General
- name: Geocoding
- name: GeoDB
- name: IP Geolocation
- name: OCR
- name: Other
- name: PDF
- name: Phone Validation
- name: Readability
- name: Web Scraping
- name: Screenshot
- name: SSL
- name: Timezone
- name: User Agent
- name: Financial
- name: Weather
- name: WHOIS
- name: ZIP Code
paths:
  /v1.0/commodity/rates/latest:
    get:
      tags:
      - Commodity
      summary: Get latest commodity prices
      description: Returns the current live price for the requested commodity symbols.
      operationId: getLatestCommodityPrices
      parameters:
      - name: format
        in: query
        required: false
        description: Response format. Currently only `json` is supported.
        schema:
          type: string
          default: json
      - name: symbols
        in: query
        required: true
        description: Comma-separated list of commodity symbols (e.g., `XAU`, `WTIOIL-SPOT`).
        schema:
          type: string
      - name: updates
        in: query
        required: true
        description: 'Update frequency. Accepted values: `1m` (default), `10m`.'
        schema:
          type: string
          enum:
          - 1m
          - 10m
          default: 1m
      - name: quote
        in: query
        required: false
        description: Target currency for the exchange rate. Defaults to the market currency of each commodity.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityLiveCommodityPricesResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    success: true
                    timestamp: 1780644645
                    rates:
                      WTIOIL-SPOT: 90.62
                      XAU: 4466.05
                    metadata:
                      WTIOIL-SPOT:
                        unit: Bbl
                        quote: USD
                      XAU:
                        unit: T.oz
                        quote: USD
        '404':
          description: Not found - Symbol or quote currency not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                symbolNotFound:
                  summary: Symbol Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: SYMBOL_NOT_FOUND
                    message: The symbol is not supported, please visit the documentation for a list of supported symbols
                    path: /v1.0/commodity/example
                quoteNotFound:
                  summary: Quote Currency Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: QUOTE_NOT_FOUND
                    message: The quote currency is invalid, please visit the documentation for a list of valid quote currencies
                    path: /v1.0/commodity/example
      security:
      - ApiKeyAuth: []
  /v1.0/commodity/rates/historical:
    get:
      tags:
      - Commodity
      summary: Get historical commodity prices
      description: Returns OHLC price data for the requested commodity symbols on a specific date.
      operationId: getHistoricalCommodityPrices
      parameters:
      - name: format
        in: query
        required: false
        description: Response format. Currently only `json` is supported.
        schema:
          type: string
          default: json
      - name: symbols
        in: query
        required: true
        description: Comma-separated list of commodity symbols.
        schema:
          type: string
      - name: date
        in: query
        required: true
        description: Date in `YYYY-MM-DD` format. Data available from 1990 onwards.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityHistoricalCommodityPricesResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    success: true
                    date: '2025-01-10'
                    rates:
                      WTIOIL-SPOT:
                        date: '2025-01-10'
                        open: 73.77
                        high: 77.16
                        low: 73.55
                        close: 75.97
                      XAU:
                        date: '2025-01-10'
                        open: 2669.93
                        high: 2697.85
                        low: 2663.61
                        close: 2689.44
        '400':
          description: Bad request - Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                invalidDateFormat:
                  summary: Invalid date format
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: Invalid Date Format (YYYY-MM-DD).
                    path: /v1.0/commodity/example
                dateNotExist:
                  summary: Date does not exist
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: 'Invalid Date: The provided date does not exist.'
                    path: /v1.0/commodity/example
        '404':
          description: Not found - Symbol or rate not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                symbolNotFound:
                  summary: Symbol Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: SYMBOL_NOT_FOUND
                    message: The symbol is not supported, please visit the documentation for a list of supported symbols
                    path: /v1.0/commodity/example
                rateNotFound:
                  summary: Rate Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: RATE_NOT_FOUND
                    message: no rates found for the specified date
                    path: /v1.0/commodity/example
      security:
      - ApiKeyAuth: []
  /v1.0/commodity/time-series:
    get:
      tags:
      - Commodity
      summary: Get commodity price time series
      description: Returns day-by-day OHLC data for the requested commodity symbols within a date range.
      operationId: getCommodityTimeSeries
      parameters:
      - name: format
        in: query
        required: false
        description: Response format. Currently only `json` is supported.
        schema:
          type: string
          default: json
      - name: symbols
        in: query
        required: true
        description: Comma-separated list of commodity symbols.
        schema:
          type: string
      - name: startDate
        in: query
        required: true
        description: Start date in `YYYY-MM-DD` format.
        schema:
          type: string
      - name: endDate
        in: query
        required: true
        description: End date in `YYYY-MM-DD` format. Maximum range is 365 days.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityCommodityTimeSeriesResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    success: true
                    startDate: '2025-01-06'
                    endDate: '2025-01-10'
                    rates:
                      '2025-01-06':
                        XAU:
                          open: 2649.01
                          high: 2651.33
                          low: 2645.36
                          close: 2646.91
                      '2025-01-07':
                        XAU:
                          open: 2662.45
                          high: 2663.06
                          low: 2655.66
                          close: 2658.9
                      '2025-01-08':
                        XAU:
                          open: 2669.69
                          high: 2674.68
                          low: 2668.58
                          close: 2671.8
                      '2025-01-09':
                        XAU:
                          open: 2669.89
                          high: 2697.87
                          low: 2663.16
                          close: 2685.61
                      '2025-01-10':
                        XAU:
                          open: 2669.93
                          high: 2697.85
                          low: 2663.61
                          close: 2689.44
        '400':
          description: Bad request - Invalid dates or range exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                invalidDate:
                  summary: Invalid date
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: 'Invalid Date: The provided start date or end date does not exist.'
                    path: /v1.0/commodity/example
                startAfterEnd:
                  summary: Start date after end date
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: start date cannot be after end date
                    path: /v1.0/commodity/example
                dateRangeExceeded:
                  summary: Date range exceeded
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: Date range exceeds the allowed limit.
                    path: /v1.0/commodity/example
        '404':
          description: Not found - Symbol or data not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                symbolNotFound:
                  summary: Symbol Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: SYMBOL_NOT_FOUND
                    message: The symbol is not supported, please visit the documentation for a list of supported symbols
                    path: /v1.0/commodity/example
                dataNotFound:
                  summary: Data Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: DATA_NOT_FOUND
                    message: No data found for the specified date range
                    path: /v1.0/commodity/example
      security:
      - ApiKeyAuth: []
  /v1.0/commodity/fluctuation:
    get:
      tags:
      - Commodity
      summary: Get commodity price fluctuations
      description: Returns price fluctuation metrics (start, end, change, percent change) for the requested commodity symbols over a date range.
      operationId: getCommodityFluctuation
      parameters:
      - name: format
        in: query
        required: false
        description: Response format. Currently only `json` is supported.
        schema:
          type: string
          default: json
      - name: symbols
        in: query
        required: true
        description: Comma-separated list of commodity symbols.
        schema:
          type: string
      - name: startDate
        in: query
        required: true
        description: Start date in `YYYY-MM-DD` format.
        schema:
          type: string
      - name: endDate
        in: query
        required: true
        description: End date in `YYYY-MM-DD` format.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityCommodityFluctuationResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    success: true
                    startDate: '2024-01-01'
                    endDate: '2024-01-31'
                    rates:
                      WTIOIL-SPOT:
                        startRate: 72.02
                        endRate: 75.81
                        change: 3.79
                        changePercent: 5.26
                      XAU:
                        startRate: 2063.63
                        endRate: 2039.83
                        change: -23.8
                        changePercent: -1.15
        '400':
          description: Bad request - Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                invalidDateFormat:
                  summary: Invalid date format
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: Invalid Date Format (YYYY-MM-DD).
                    path: /v1.0/commodity/example
                dateNotExist:
                  summary: Date does not exist
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: 'Invalid Date: The provided start date or end date does not exist.'
                    path: /v1.0/commodity/example
                startAfterEnd:
                  summary: Start date after end date
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: VALIDATION_ERROR
                    message: Start date cannot be after end date
                    path: /v1.0/commodity/example
        '404':
          description: Not found - Symbol or data not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityErrorResponse'
              examples:
                symbolNotFound:
                  summary: Symbol Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: SYMBOL_NOT_FOUND
                    message: The symbol is not supported, please visit the documentation for a list of supported symbols
                    path: /v1.0/commodity/example
                noData:
                  summary: Data Not Found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: DATA_NOT_FOUND
                    message: No data found for the given date range
                    path: /v1.0/commodity/example
      security:
      - ApiKeyAuth: []
  /v1.0/commodity/symbols:
    get:
      tags:
      - Commodity
      summary: Get all supported commodity symbols
      description: Returns the list of supported commodity symbols with metadata.
      operationId: getCommoditySymbols
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format. Accepted values: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityCommoditySymbolsResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    success: true
                    symbols:
                    - symbol: XAU
                      name: Gold
                      category: Metals
                      status: active
                      updateInterval: PER_SECOND
                      currency:
                        code: USD
                        name: US Dollar
                        symbol: $
                      unit:
                        symbol: T.oz
                        name: Troy Ounce
                    - symbol: NG-FUT
                      name: Natural Gas Futures
                      category: Energy
                      status: active
                      updateInterval: PER_MINUTE
                      currency:
                        code: USD
                        name: US Dollar
                        symbol: $
                      unit:
                        symbol: MMBtu
                        name: Million British Thermal Units
      security:
      - ApiKeyAuth: []
  /v1.0/currency/rates/latest:
    get:
      tags:
      - Currency
      summary: Get the latest exchange rates
      description: Returns the latest exchange rates for the requested base currency and symbols.
      operationId: getLatestExchangeRates
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      - name: base
        in: query
        required: false
        description: Base currency code. Defaults to `USD`. Supports fiat, crypto, and metals.
        schema:
          type: string
          default: USD
      - name: symbols
        in: query
        required: false
        description: Comma-separated currency codes. Omit to get all available rates.
        schema:
          type: string
      - name: updates
        in: query
        required: false
        description: 'Update frequency: `1m` (default), `10m`, `1h`, or `1d`.'
        schema:
          type: string
          enum:
          - 1m
          - 10m
          - 1h
          - 1d
          default: 1m
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyLatestExchangeRatesResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    date: '2026-06-05 09:03:00+00'
                    base: USD
                    rates:
                      EUR: '0.859476'
                      PKR: '278.425'
        '400':
          description: Bad request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidUpdates:
                  summary: Invalid updates parameter
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Please provide valid updates parameter (1d,1h,10m,1m)
                    path: /v1.0/currency/example
        '404':
          description: Not found - Currency or symbol not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidBase:
                  summary: Invalid base currency
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided currency [CURRENCY_CODE] are not available in our database!
                    path: /v1.0/currency/example
                invalidSymbols:
                  summary: Invalid symbols
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided Symbols are not available in our database!
                    path: /v1.0/currency/example
      security:
      - ApiKeyAuth: []
  /v1.0/currency/rates/historical:
    get:
      tags:
      - Currency
      summary: Get historical exchange rates
      description: Returns exchange rates for a specific historical date.
      operationId: getHistoricalExchangeRates
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      - name: base
        in: query
        required: false
        description: Base currency code. Defaults to `USD`. Supports fiat, crypto, and metals.
        schema:
          type: string
          default: USD
      - name: symbols
        in: query
        required: false
        description: Comma-separated currency codes. Omit to get all available rates.
        schema:
          type: string
      - name: date
        in: query
        required: true
        description: Historical date in `YYYY-MM-DD` format.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyHistoricalExchangeRatesResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    date: '2025-01-10'
                    base: USD
                    rates:
                      EUR: '0.9762'
                      PKR: '278.65'
        '400':
          description: Bad request - Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidDateFormat:
                  summary: Invalid date format
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Provided Date [DATE] is in invalid format. It should be like YYYY-MM-DD!
                    path: /v1.0/currency/example
        '404':
          description: Not found - Currency, symbol, or date not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                dateNotFound:
                  summary: Date not found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided date [DATE] are not available in our database.
                    path: /v1.0/currency/example
                invalidBase:
                  summary: Invalid base currency
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided currency [CURRENCY_CODE] are not available in our database!
                    path: /v1.0/currency/example
                invalidSymbols:
                  summary: Invalid symbols
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided Symbols are not available in our database!
                    path: /v1.0/currency/example
      security:
      - ApiKeyAuth: []
  /v1.0/currency/converter/latest/prices:
    get:
      tags:
      - Currency
      summary: Convert currency with latest rates
      description: Converts an amount from one currency to another using the latest exchange rates.
      operationId: convertLatest
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      - name: from
        in: query
        required: true
        description: Source currency code.
        schema:
          type: string
      - name: to
        in: query
        required: true
        description: Target currency code.
        schema:
          type: string
      - name: amount
        in: query
        required: false
        description: Amount to convert as a positive decimal. Defaults to `1`.
        schema:
          type: string
          default: '1'
      - name: updates
        in: query
        required: false
        description: 'Update frequency: `1m` (default), `10m`, `1h`, or `1d`.'
        schema:
          type: string
          enum:
          - 1m
          - 10m
          - 1h
          - 1d
          default: 1m
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyLatestCurrencyConverterResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    date: '2026-06-05 09:03:00+00'
                    from: USD
                    to: EUR
                    rate: '0.85948'
                    givenAmount: '100.0'
                    convertedAmount: '85.948'
        '400':
          description: Bad request - Invalid amount or updates parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidAmount:
                  summary: Invalid amount
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Invalid Amount. Please provide amount in decimal format and greater than 0!
                    path: /v1.0/currency/example
                invalidUpdates:
                  summary: Invalid updates parameter
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Please provide valid updates parameter (1d,1h,10m,1m)
                    path: /v1.0/currency/example
        '404':
          description: Not found - Currency not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidBase:
                  summary: Invalid currency
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided currency [CURRENCY_CODE] are not available in our database!
                    path: /v1.0/currency/example
      security:
      - ApiKeyAuth: []
  /v1.0/currency/converter/historical/prices:
    get:
      tags:
      - Currency
      summary: Convert currency with historical rates
      description: Converts an amount using exchange rates from a specific historical date.
      operationId: convertHistorical
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      - name: from
        in: query
        required: true
        description: Source currency code.
        schema:
          type: string
      - name: to
        in: query
        required: true
        description: Target currency code.
        schema:
          type: string
      - name: amount
        in: query
        required: false
        description: Amount to convert as a positive decimal. Defaults to `1`.
        schema:
          type: string
          default: '1'
      - name: date
        in: query
        required: true
        description: Historical date in `YYYY-MM-DD` format.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyHistoricalCurrencyConverterResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    date: '2025-01-10'
                    from: USD
                    to: EUR
                    rate: '0.97620'
                    givenAmount: '100.0'
                    convertedAmount: '97.620'
        '400':
          description: Bad request - Invalid amount or date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidAmount:
                  summary: Invalid amount
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Invalid Amount. Please provide amount in decimal format and greater than 0!
                    path: /v1.0/currency/example
                invalidDateFormat:
                  summary: Invalid date format
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Provided Date [DATE] is in invalid format. It should be like YYYY-MM-DD!
                    path: /v1.0/currency/example
        '404':
          description: Not found - Currency or date not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                dateNotFound:
                  summary: Date not found
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided date [DATE] are not available in our database.
                    path: /v1.0/currency/example
                invalidBase:
                  summary: Invalid currency
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided currency [CURRENCY_CODE] are not available in our database!
                    path: /v1.0/currency/example
      security:
      - ApiKeyAuth: []
  /v1.0/currency/time-series:
    get:
      tags:
      - Currency
      summary: Get time series of exchange rates
      description: Returns day-by-day historical exchange rates for a custom date range.
      operationId: getTimeSeries
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      - name: startDate
        in: query
        required: true
        description: Start date in `YYYY-MM-DD` format.
        schema:
          type: string
      - name: endDate
        in: query
        required: false
        description: End date in `YYYY-MM-DD` format. Defaults to yesterday.
        schema:
          type: string
      - name: base
        in: query
        required: false
        description: Base currency code. Defaults to `USD`.
        schema:
          type: string
          default: USD
      - name: symbols
        in: query
        required: false
        description: Comma-separated currency codes. Omit to get all available rates.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyCurrencyTimeseriesResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    startDate: '2025-01-01'
                    endDate: '2025-01-07'
                    base: USD
                    historicalRatesList:
                    - date: '2025-01-01'
                      rates:
                        EUR: '0.96605'
                        PKR: '278.4'
                    - date: '2025-01-02'
                      rates:
                        EUR: '0.9739'
                        PKR: '278.4'
                    - date: '2025-01-03'
                      rates:
                        EUR: '0.97005'
                        PKR: '278.4'
                    - date: '2025-01-04'
                      rates:
                        EUR: '0.97005'
                        PKR: '278.4'
                    - date: '2025-01-05'
                      rates:
                        EUR: '0.9704'
                        PKR: '278.4'
                    - date: '2025-01-06'
                      rates:
                        EUR: '0.96305'
                        PKR: '278.4'
                    - date: '2025-01-07'
                      rates:
                        EUR: '0.967'
                        PKR: '278.4'
        '400':
          description: Bad request - Invalid dates or range exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                rangeExceeded:
                  summary: Range exceeds 1 year
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: You can only retrieve time series data for a maximum interval of 1 Year
                    path: /v1.0/currency/example
                startAfterEnd:
                  summary: Start date after end or current date
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Starting date cannot be after current date or ending date
                    path: /v1.0/currency/example
                invalidDateFormat:
                  summary: Invalid date format
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Provided Dates are in Invalid Format. Dates must be in a valid format YYYY-MM-DD!
                    path: /v1.0/currency/example
        '404':
          description: Not found - No data for interval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                noData:
                  summary: No data for interval
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided base and symbols are not found for given intervals.
                    path: /v1.0/currency/example
      security:
      - ApiKeyAuth: []
