      parameters:
      - name: format
        in: query
        description: Format of the response
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
      - name: ip
        in: query
        description: IPv4 or IPv6 address to extract timezone information.
        required: false
        schema:
          type: string
          format: ipv4
      - name: tz
        in: query
        description: Timezone name (e.g., "Asia/Kolkata") to retrieve information directly.
        required: false
        schema:
          type: string
      - name: location
        in: query
        description: Location string (preferably city and country) to extract timezone.
        required: false
        schema:
          type: string
      - name: lat
        in: query
        description: Latitude for geolocation lookup.
        required: false
        schema:
          type: number
          format: float
      - name: long
        in: query
        description: Longitude for geolocation lookup.
        required: false
        schema:
          type: number
          format: float
      - name: lang
        in: query
        description: Language code for response localization (default is "en").
        required: false
        schema:
          type: string
          default: en
      - name: iata_code
        in: query
        description: 3-letter IATA airport code (e.g., JFK).
        required: false
        schema:
          type: string
      - name: icao_code
        in: query
        description: 4-letter ICAO airport code (e.g., KJFK).
        required: false
        schema:
          type: string
      - name: lo_code
        in: query
        description: 5-letter UN/LO city code.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Timezone lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimezoneTimezoneResponse'
        '400':
          description: Bad Request – Invalid parameters provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: '''latitude'' (999) or ''longitude'' (0) is not valid.'
              examples:
                Invalid coordinates:
                  value:
                    message: '''latitude'' (999) or ''longitude'' (0) is not valid. ''latitude'' must be between -90.0 and +90.0 and ''longitude'' must be between -180.0 and +180.0.'
                Invalid timezone name:
                  value:
                    message: Check whether your input values are correct; time_zone_name = Invalid/Timezone
                Invalid IP address:
                  value:
                    message: '''999.999.999.999'' is not an IP string literal.'
                Invalid IATA code:
                  value:
                    message: 'Invalid IATA code: INVALID. IATA code must be in the format of AAA.'
                Invalid ICAO code:
                  value:
                    message: 'Invalid ICAO code: INVALID. ICAO code must be in the format of AAAA.'
                Invalid LO code:
                  value:
                    message: '''Data not found for the provided LO code: XXXXX Please contact at support@ipgeolocation.io if provided LO code exists.'''
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: We couldn't find the location (ZZZNOTEXIST).
              examples:
                Location Not Found:
                  value:
                    message: We couldn't find the location (ZZZNOTEXIST). Try a city or state level location address only.
      security:
      - ApiKeyAuth: []
  /v1.0/timezone/converter:
    get:
      tags:
      - Timezone
      summary: Convert any timestamp from one timezone to another using timezone names, location coordinates, or location addresses.
      description: Converts a given time from one timezone to another using various input types like timezone name, coordinates, location, or codes.
      operationId: convertTimezone
      parameters:
      - name: format
        in: query
        description: Format of the response .
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
      - name: time
        in: query
        description: Time to convert in `yyyy-MM-dd HH:mm` or `yyyy-MM-dd HH:mm:ss` format.
        required: false
        schema:
          type: string
      - name: tz_from
        in: query
        description: Source timezone name (e.g., `Asia/Kolkata`).
        required: false
        schema:
          type: string
      - name: tz_to
        in: query
        description: Target timezone name (e.g., `America/New_York`).
        required: false
        schema:
          type: string
      - name: lat_from
        in: query
        description: Latitude of source location.
        required: false
        schema:
          type: number
      - name: long_from
        in: query
        description: Longitude of source location.
        required: false
        schema:
          type: number
      - name: lat_to
        in: query
        description: Latitude of target location.
        required: false
        schema:
          type: number
      - name: long_to
        in: query
        description: Longitude of target location.
        required: false
        schema:
          type: number
      - name: location_from
        in: query
        description: From location (city/country).
        required: false
        schema:
          type: string
      - name: location_to
        in: query
        description: To location (city/country).
        required: false
        schema:
          type: string
      - name: iata_from
        in: query
        description: From IATA airport code (e.g., JFK).
        required: false
        schema:
          type: string
      - name: iata_to
        in: query
        description: To IATA airport code.
        required: false
        schema:
          type: string
      - name: icao_from
        in: query
        description: From ICAO airport code (e.g., KJFK).
        required: false
        schema:
          type: string
      - name: icao_to
        in: query
        description: To ICAO airport code.
        required: false
        schema:
          type: string
      - name: locode_from
        in: query
        description: From UN/LO CODE.
        required: false
        schema:
          type: string
      - name: locode_to
        in: query
        description: To UN/LO CODE.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimezoneTimezoneConversionResponse'
        '400':
          description: Bad Request – Invalid parameters provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Parameters' combination is not complete.
              examples:
                Incomplete parameters combination:
                  value:
                    message: Parameters' combination is not complete. 'tz_from' and 'tz_to' or 'location_from' and 'location_to' or 'lat_from' and 'long_from' and 'lat_to' and 'long_to' or 'locode_from' and 'locode_to' or 'iata_from' and 'iata_to' or 'icao_from' and 'icao_to' combinations must be provided.
                Invalid source timezone:
                  value:
                    message: Check whether your input values are correct; source_time_zone = Invalid/TZ, destined_time_zone = Asia/Karachi, date_time = null
                Invalid coordinates range:
                  value:
                    message: Provided  lat_from (999) or long_from (0) is not valid. Latitude must be between -90.0 and +90.0 and longitude must be between -180.0 and +180.0.
                From location not found:
                  value:
                    message: We couldn't find the (from) location (ZZZNOTEXIST). Try a city or state level address only.
                Invalid airport code:
                  value:
                    message: '''Data not found for the provided airport code: XXX Please contact at support@ipgeolocation.io if provided airport code exists.'''
      security:
      - ApiKeyAuth: []
