  /v1.0/scraping:
    post:
      tags:
      - Web Scraping
      summary: Perform web scraping with custom instructions
      description: "Execute a series of web scraping instructions on a target URL. \nSupports various operations like form filling, clicking, data extraction, and CAPTCHA solving.\n"
      operationId: performScraping
      parameters:
      - name: url
        in: query
        required: true
        description: Target URL to scrape
        schema:
          type: string
          format: uri
          examples:
          - https://example.com
      - name: text
        in: query
        required: false
        description: Set to `true` to return the data in text format else `false` for data in html format with tags.
        schema:
          type: boolean
      - name: jsEnabled
        in: query
        required: false
        description: "Set `true` to enable JavaScript rendering for dynamic pages. Set `false` for static HTML pages.\n\n\n Default value is `false`."
        schema:
          type: boolean
      - name: proxy
        in: query
        required: false
        description: Use proxy for requests. Can be `true`/`false`, a proxy URL string, or a proxy configuration object.
        schema:
          oneOf:
          - type: boolean
          - type: string
      - name: sslIgnore
        in: query
        required: false
        description: "Ignore SSL certificate errors.\n\n\n Only works if **jsEnabled** is **true**."
        schema:
          type: boolean
      - name: windowSize
        in: query
        required: false
        description: "Specify the browser window size in the format 'width,height' (e.g., \"1920w,1080h\"). Default value is the default resolutions provided by web/browser.\n\n\n Only works if **jsEnabled** is **true**."
        schema:
          type: string
      - name: adBlock
        in: query
        required: false
        description: "Set to `true` to apply ad-blocker to the specified URL else false or ignore to not apply.\n\n\n Only works if **jsEnabled** is **true**."
        schema:
          type: boolean
      - name: captcha
        in: query
        required: false
        description: "if true user can provide captcha instructions in the instructions to solve image captchas.\n\n\n  Only works if **jsEnabled** is **true**."
        schema:
          type: boolean
      requestBody:
        required: false
        description: '# How Does the Request Body Work?


          There are two available modes based on the `jsEnabled` flag:


          1. **jsEnabled = true**: Enables scraping of websites that require JavaScript execution. In this mode, you can use advanced features such as **blockUrl**, **cookies**, and various **instructions** like `fill`, `click`, `extract`, and more to interact with the page and extract dynamic content.


          2. **jsEnabled = false**: Designed for scraping static HTML pages where JavaScript is not required. Supported instructions include `postForm`, `extract`, and others suitable for non-interactive pages.


          The request body must contain an array of instructions that will be executed sequentially.


          **Note:** All available instruction options are listed within each mode. Construct the body according to the requirements of the website being scraped.'
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/WebScrapingJsEnabledTrueBody'
              - $ref: '#/components/schemas/WebScrapingJsEnabledFalseBody'
              discriminator:
                propertyName: jsEnabled
                mapping:
                  'true': '#/components/schemas/JsEnabledTrueBody'
                  'false': '#/components/schemas/JsEnabledFalseBody'
            examples:
              jsEnabledTrue:
                summary: Example for jsEnabled = true
                value:
                  blockUrl:
                  - https://example.com/ads.js
                  - https://tracker.example.com/*
                  cookies:
                  - name: sessionid
                    value: abc123
                  - name: user_pref
                    value: darkmode
                  instructions:
                  - fill:
                      place: '#username'
                      value: myuser
                  - fill:
                      place: '#password'
                      value: mypassword
                  - click: '#loginButton'
                  - wait: 2000
                  - extract:
                      html: '#profile'
                      text: '#welcome-message'
                      user_data: '#user-info'
                  - blockElement:
                    - .ad-banner
                    - //div[@class='popup']
                  - generalImageCaptcha:
                    - imagePath: '#captcha-img'
                      textField: '#captcha-input'
                      imageUpdatePath: '#refresh-captcha'
                      captchaFailedPath: '#captcha-error'
                      model: Model_1
              jsEnabledFalse:
                summary: Example for jsEnabled = false
                value:
                  instructions:
                  - postForm:
                      selector: '#loginForm'
                      data:
                        username: myuser
                        password: mypassword
                  - extract:
                      html: '#main-content'
                      text: '#welcome-message'
                  - getForm:
                      selector: '#searchForm'
                      data:
                        query: API scraping
                  - extract:
                      text: '#search-results'
      responses:
        '200':
          description: Successful scraping operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebScrapingScrapingResponse'
              examples:
                domainLookupResult:
                  summary: Domain lookup result
                  value:
                    extractedData:
                      html: 'El nombre de dominio: google.sv se encuentra RegistradoNombre de dominio: google.svEstado: RegistradoContacto Administrativo: Cesar Ulises Trujillo MartínezCorreo Electrónico: admin@admindotsv.comTeléfono: 503 2284-8531Fecha Registro: 01-01-2013Fecha de vencimiento: 01-01-2026Fecha de Baja: 01-02-2026'
                structuredDomainData:
                  summary: Structured domain data extraction
                  value:
                    extractedData:
                      server:
                      - coleman.ns.cloudflare.com
                      - nadia.ns.cloudflare.com
                      - ''
                      - ''
                      domain name: nust.edu.pk
                      expiry date: Feb 1, 2026
                      status: Domain is Registered
        '400':
          description: Bad request - Invalid parameters or malformed instructions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebScrapingErrorResponse'
              examples:
                invalidParams:
                  summary: Invalid parameters
                  value:
                    timestamp: '2024-01-15T10:30:00Z'
                    status: 400
                    message: please pass correct parameters
                    path: /v1.0/scraping
                invalidUrl:
                  summary: Invalid URL
                  value:
                    timestamp: '2024-01-15T10:30:01Z'
                    status: 400
                    message: URL cannot be null or empty. Please enter a valid URL.
                    path: /v1.0/scraping
                selectorParseException:
                  summary: Selector parse error
                  value:
                    timestamp: '2024-01-15T10:30:02Z'
                    status: 400
                    message: The CSS or XPath selector provided is incorrect or unparseable.
                    path: /v1.0/scraping
                validationException:
                  summary: Validation error
                  value:
                    timestamp: '2024-01-15T10:30:03Z'
                    status: 400
                    message: Missing required fields in postForm or getForm instruction.
                    path: /v1.0/scraping
                noSuchMethodException:
                  summary: No such method
                  value:
                    timestamp: '2024-01-15T10:30:04Z'
                    status: 400
                    message: The instruction contains an invalid or unsupported method.
                    path: /v1.0/scraping
                captchaFailed:
                  summary: CAPTCHA failed
                  value:
                    timestamp: '2024-01-15T10:30:05Z'
                    status: 400
                    message: CAPTCHA was attempted but failed after retries.
                    path: /v1.0/scraping
                httpStatusException:
                  summary: HTTP status error
                  value:
                    timestamp: '2024-01-15T10:30:06Z'
                    status: 400
                    message: The target URL returned a non-200 HTTP response.
                    path: /v1.0/scraping
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebScrapingErrorResponse'
        '404':
          description: Resource not found - The target URL could not be reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebScrapingErrorResponse'
        '405':
          description: Method not allowed - Wrong HTTP method used on the endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebScrapingErrorResponse'
        '408':
          description: Request timeout - The request was not completed within the expected time frame
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebScrapingErrorResponse'
      security:
      - ApiKeyAuth: []
