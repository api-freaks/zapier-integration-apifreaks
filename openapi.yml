              first_seen:
                type: string
                description: The date when the subdomain was first discovered.
              last_seen:
                type: string
                description: The most recent date when the subdomain was observed. This field is only returned if the subdomain has been re-detected after its initial discovery.
              inactive_from:
                type: string
                description: The date from which the subdomain is considered inactive. This field appears only if the subdomain is no longer active.
