              properties:
                as_number:
                  type: string
                  description: Autonomous system number of the autonomous system, to which IP address belongs to.
                  mandatory: false
                organization:
                  type: string
                  description: Legal Full Name of AS organization holding the IP address.
                  mandatory: false
                country:
                  type: string
                  description: Name of the country, ASN is residing.
                  mandatory: false
                asn_name:
                  type: string
                  description: Name associated with the Autonomous System, usually representing organization.
                  mandatory: false
                type:
                  type: string
                  description: Type of the ASN, whether ISP, Business, etc.
                  mandatory: false
                domain:
                  type: string
                  description: Domain name associated with the ASN holding the IP address.
                  mandatory: false
                date_allocated:
                  type: string
                  description: Last date, when the IP address assigned to the ASN. e.g., in format 1st June 2001
                  mandatory: false
                allocation_status:
                  type: string
                  description: Whether the IP address is currently assigned to the ASN or not.
                  mandatory: false
                num_of_ipv4_routes:
                  type: string
                  description: Total number of IPv4 routes, held by the ASN. These Routes can be queried from our ASN API.
                  mandatory: false
                num_of_ipv6_routes:
                  type: string
                  description: Total number of IPv6 routes, held by the ASN. These Routes can be queried from our ASN API.
                  mandatory: false
                rir:
                  type: string
                  description: Name of the Regional Internet Registry (RIR) that allocated the AS number.
                  mandatory: false
            connection_type:
              type: string
              description: Type of the connection, consuming the IP address.
              mandatory: false
            company:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the company/ISP holding the IP address.
                  mandatory: true
                type:
                  type: string
                  description: Type of the company whether it is an ISP, hosting provider or business, etc.
                  mandatory: false
                domain:
                  type: string
                  description: Official domain name used by the company.
                  mandatory: false
        currency:
          type: object
          description: The currency information
          mandatory: false
          properties:
            code:
              type: string
              description: Currency code (ISO 4217).
              mandatory: true
              example: PKR
            name:
              type: string
              description: Currency name (ISO 4217).
              mandatory: true
              example: Pakistan Rupee
            symbol:
              type: string
              description: Currency symbol.
              mandatory: true
              example: ₨
        security:
          type: object
          description: The security information
          mandatory: false
          properties:
            threat_score:
              type: number
