  /v1.0/readability/score:
    post:
      tags:
      - Readability
      summary: Calculate readability scores, grade, and sentence-level readability.
      description: Analyze text readability using industry-standard formulas including Flesch Reading Ease, Flesch-Kincaid Grade Level, Gunning Fog Index, SMOG Index, Coleman-Liau Index, and Automated Readability Index.
      parameters:
      - in: query
        name: apiKey
        required: true
        schema:
          type: string
        description: Your API key
      - in: query
        name: target
        required: false
        schema:
          type: string
          enum:
          - general
          - professional
          - academic
          - technical
          default: general
        description: Target audience used to tune sentence difficulty levels
      - in: query
        name: exclude
        required: false
        schema:
          type: string
        description: Comma-separated response sections to omit. Possible values are readability_scores, sentence_readability, readability_grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - text
              properties:
                text:
                  type: string
                  description: Text to analyze for readability
            examples:
              readabilityScoreRequest:
                summary: Analyze readability scores
                value:
                  text: The global mental is health crisis is now a serious and compelex problem. It needs quick and ongoing action from policymakers, healthcare workers, and the whole society.
      responses:
        '200':
          description: Successful readability analysis response
          content:
            application/json:
              schema:
                type: object
                properties:
                  readability_scores:
                    type: object
                    description: Standard readability formula scores, keyed by metric name. Metrics that cannot be computed for the supplied text are omitted.
                    properties:
                      flesch_reading_ease:
                        type: object
                        description: Flesch Reading Ease
                        properties:
                          score:
                            type: number
                            description: The metric score
                          level:
                            type: string
                            description: Human-readable difficulty level for that metric
                      flesch_kincaid_grade:
                        type: object
                        description: Flesch-Kincaid Grade Level
                        properties:
                          score:
                            type: number
                            description: The metric score
                          level:
                            type: string
                            description: Human-readable difficulty level for that metric
                      gunning_fog:
                        type: object
                        description: Gunning Fog Index
                        properties:
                          score:
                            type: number
                            description: The metric score
                          level:
                            type: string
                            description: Human-readable difficulty level for that metric
                      smog_index:
                        type: object
                        description: SMOG Index
                        properties:
                          score:
                            type: number
                            description: The metric score
                          level:
                            type: string
                            description: Human-readable difficulty level for that metric
                      coleman_liau_index:
                        type: object
                        description: Coleman-Liau Index
                        properties:
                          score:
                            type: number
                            description: The metric score
                          level:
                            type: string
                            description: Human-readable difficulty level for that metric
                      automated_readability_index:
                        type: object
                        description: Automated Readability Index (ARI)
                        properties:
                          score:
                            type: number
                            description: The metric score
                          level:
                            type: string
                            description: Human-readable difficulty level for that metric
                  sentence_readability:
                    type: array
                    description: Per-sentence readability breakdown
                    items:
                      type: object
                      properties:
                        sentence:
                          type: string
                          description: The sentence text
                        readability_grade:
                          type: number
                          description: Readability grade for the sentence
                        readability_level:
                          type: string
                          enum:
                          - Very Easy
                          - Easy
                          - Medium
                          - Hard
                          - Very Hard
                          description: Difficulty level for the sentence based on the target audience
                  readability_grade:
                    type: number
                    description: Overall readability grade, calculated as the average of sentence readability scores
              examples:
                readabilityScoreResponse:
                  summary: Readability scores calculated
                  value:
                    readability_scores:
                      flesch_reading_ease:
                        score: 51.9903
                        level: Fairly Difficult
                      flesch_kincaid_grade:
                        score: 9.7755
                        level: Grade 10
                      gunning_fog:
                        score: 10.4623
                        level: Standard
                      smog_index:
                        score: 10.8642
                        level: Grade 11
                      coleman_liau_index:
                        score: 13.033
                        level: Grade 13
                      automated_readability_index:
                        score: 12.0325
                        level: Grade 12
                    sentence_readability:
                    - sentence: The global mental is health crisis is now a serious and compelex problem.
                      readability_grade: 8.9496
                      readability_level: Easy
