  /v1.0/email-validation/single:
    post:
      tags:
      - Email Validation
      summary: Validate a single email
      description: Validates a single email address and returns result.
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Email address to validate
                name:
                  type: string
                  description: Name of the email address
                ip:
                  type: string
                  description: IP address of the email address
      responses:
        '200':
          description: Successful response with Email Validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailValidationSingleEmailValidationResponse'
              examples:
                ValidEmail:
                  value:
                    success: true
                    email: abc.def@gmail.com
                    name: Test User
                    validEmail: valid
                    validSyntax: true
                    domain:
                      name: gmail.com
                      disposable: false
                      spam: false
                      free: true
                      validDomain: true
                      catchAll: false
                    account:
                      role: false
                      fullMailBox: false
                    dns:
                      mxRecords:
                      - gmail-smtp-in.l.google.com.
                      - alt1.gmail-smtp-in.l.google.com.
                      - alt2.gmail-smtp-in.l.google.com.
                      - alt3.gmail-smtp-in.l.google.com.
                      - alt4.gmail-smtp-in.l.google.com.
                      aRecords:
                      - 142.250.80.5
        '400':
          description: Bad Request – Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    example: '2026-06-06T13:00:00.000Z'
