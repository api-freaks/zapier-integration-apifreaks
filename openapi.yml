              type: string
              description: Name of the proxy provider, if the IP address belongs to a proxy network.
              mandatory: false
              nullable: true
            is_anonymous:
              type: boolean
              description: Indicates if the IP address is being used anonymously.
              mandatory: true
            is_known_attacker:
              type: boolean
              description: Indicates if the IP address is enlisted as an attacking IP address.
              mandatory: true
            is_spam:
              type: boolean
              description: Indicates if the IP address is enlisted as a spam IP address.
              mandatory: true
            is_bot:
              type: boolean
              description: Indicates if the IP address is enlisted as a bot IP address.
              mandatory: true
            is_cloud_provider:
              type: boolean
              description: Indicates if the IP address belongs to a cloud provider (computing infrastructure providers).
              mandatory: true
            cloud_provider:
              type: string
              description: Name of the Cloud Provider, if the IP address belongs to a cloud provider.
              mandatory: false
              nullable: true
        abuse:
          type: object
          description: The abuse information
          mandatory: false
          properties:
            route:
              type: string
              description: Network route associated with the IP address.
              mandatory: false
            country:
              type: string
              description: Country where the responsible entity is located.
              mandatory: false
            handle:
              type: string
              description: Abuse handle or ID found in WHOIS or RDAP records.
              mandatory: false
            name:
              type: string
              description: Name of the abuse contact person or entity.
              mandatory: false
            organization:
              type: string
              description: Organization responsible for the IP address.
              mandatory: false
            role:
              type: string
              description: Role of the contact (e.g., abuse, administrative, registrant, etc.).
              mandatory: false
            kind:
              type: string
              description: 'Type of contact: individual, team, or organization.'
              mandatory: false
            address:
              type: string
              description: Physical mailing address of the responsible entity.
              mandatory: false
            emails:
              type: array
              items:
