            country:
              type: string
              description: Country name extracted from IBAN.
              example: United Kingdom
            country_iso2:
              type: string
              description: Alpha-2 standard country code extracted from IBAN.
              example: GB
            city:
              type: string
              description: City / branch name for respective bank extracted from IBAN for some countries.
              example: BIRMINGHAM
            address:
              type: string
              description: Bank branch address extracted from IBAN
              example: 6 BRINDLEY PLACE
            account:
              type: string
              description: Account number extracted from IBAN
              example: '00000003'
            sepa:
              type: boolean
              description: Indicates whether given IBAN country supports Single Euro Payments Area (SEPA)
              example: true
          required:
          - country
          - country_iso2
          - sepa
      required:
      - valid
      - iban
      - validation
      - bank_data
      example:
        valid: true
        iban: GB49NWBK08609000000003
        validation:
          is_alpha_numeric: true
          is_iban_supported_country: true
          is_valid_length: true
          is_valid_structure: true
          is_iban_check_digit_valid: true
          bban: valid
        bank_data:
          bic: NWBKGB2LBHM
          bank: NATIONAL WESTMINSTER BANK PLC
          bank_code: NWBK
          branch_code: 086090
          country: United Kingdom
          country_iso2: GB
          city: BIRMINGHAM
          address: 6 BRINDLEY PLACE
          account: '00000003'
          sepa: true
