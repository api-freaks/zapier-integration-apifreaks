  /v1.0/currency/converter/ip-to-currency:
    get:
      tags:
      - Currency
      summary: Convert currency based on IP geolocation
      description: Converts an amount to the local currency of a given IP address.
      operationId: convertByIp
      parameters:
      - name: format
        in: query
        required: false
        description: 'Response format: `json` (default) or `xml`.'
        schema:
          type: string
          enum:
          - json
          - xml
          default: json
      - name: from
        in: query
        required: true
        description: Source currency code.
        schema:
          type: string
      - name: ip
        in: query
        required: false
        description: IPv4 or IPv6 address. Defaults to the request IP.
        schema:
          type: string
      - name: amount
        in: query
        required: false
        description: Amount to convert as a positive decimal. Defaults to `1`.
        schema:
          type: string
          default: '1'
      - name: updates
        in: query
        required: false
        description: 'Update frequency: `1m` (default), `10m`, `1h`, or `1d`.'
        schema:
          type: string
          enum:
          - 1m
          - 10m
          - 1h
          - 1d
          default: 1m
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyGeolocalizedCurrencyConverterResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    date: '2026-06-05 14:39:00+00'
                    from: USD
                    to: PKR
                    rate: '278.425'
                    ipAddress: 182.186.18.91
                    givenAmount: '100.0'
                    convertedAmount: '27842.500'
        '400':
          description: Bad request - Invalid IP, amount, or updates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                invalidAmount:
                  summary: Invalid amount
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Invalid Amount. Please provide amount in decimal format and greater than 0!
                    path: /v1.0/currency/example
                invalidUpdates:
                  summary: Invalid updates parameter
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Please provide valid updates parameter (1d,1h,10m,1m)
                    path: /v1.0/currency/example
                invalidIp:
                  summary: Invalid IP address
                  value:
                    timestamp: 1781792620618
                    status: 400
                    error: Invalid Param Exception
                    message: Provided IP Address [IP_ADDRESS] is invalid.
                    path: /v1.0/currency/example
        '404':
          description: Not found - IP geolocation or currency not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyErrorResponse'
              examples:
                unknownIp:
                  summary: Unknown IP
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Geolocation of provided IP [IP_ADDRESS] is unknown.
                    path: /v1.0/currency/example
                invalidBase:
                  summary: Invalid currency
                  value:
                    timestamp: 1781792620618
                    status: 404
                    error: Not Found Exception
                    message: Rates of provided currency [CURRENCY_CODE] are not available in our database!
                    path: /v1.0/currency/example
      security:
      - ApiKeyAuth: []
