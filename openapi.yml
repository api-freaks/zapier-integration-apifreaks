  /v1.0/phone/validation:
    post:
      tags:
      - Phone Validation
      summary: Validate a single phone number
      description: Validates a single phone number and returns detailed metadata including carrier, line type, geolocation, time zones, and standardized formats.
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
        description: Specifies the desired format for the API response. Choose 'json' for a JSON object. If not provided, the API defaults to JSON format.
      requestBody:
        required: true
        description: 'Send a JSON object with `number` as the only required field. Use `region` **or** `dialer_region` when needed — never both at the same time.


          - **International format** (`+` prefix): provide `number` only — no region needed.

          - **Local format** (no `+`, e.g. `03301112233`): provide `number` + `region` (ISO 2-letter country code).

          - **IDD format** (exit code, e.g. `00923301112233`): provide `number` + `dialer_region` (country you are dialing from).'
        content:
          application/json:
            schema:
              type: object
              required:
              - number
              properties:
                number:
                  type: string
                  description: Phone number to validate. Accepts international format (+14155552671), local format (4155552671) with region, or IDD format (0014155552671) with dialer_region.
                region:
                  type: string
                  description: Two-letter ISO country code (e.g., US, GB). Required when number is in local format without + prefix. Cannot be used together with dialer_region.
                dialer_region:
                  type: string
                  description: Two-letter ISO country code indicating the country the number is being dialed from. Required when number uses IDD exit code. Cannot be used together with region.
            examples:
              international_format:
                summary: International format (+ prefix) — no region needed
                value:
                  number: '+14155552671'
              local_format_with_region:
                summary: Local format — use region (not dialer_region)
                value:
                  number: '03301112233'
                  region: PK
              idd_format_with_dialer_region:
                summary: IDD format — use dialer_region (not region)
                value:
                  number: '0014155552671'
                  dialer_region: AU
      responses:
        '200':
          description: Successful phone number validation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationPhoneValidationResponse'
              example:
                raw_input:
                  number: '+14155552671'
                possible: true
                valid: true
                country_prefix: 1
                national_number: 4155552671
                country_code: US
                location: San Francisco, CA
                time_zones:
                - America/Los_Angeles
                line_type: FIXED_LINE_OR_MOBILE
                formats:
                  E164: '+14155552671'
                  International: +1 415-555-2671
                  National: (415) 555-2671
                  RFC3966: tel:+1-415-555-2671
                area_code_length: 3
                ndc_length: 3
                can_be_internationally_dialled: true
        '400':
          description: Bad Request – e.g. missing required field or both region codes provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationErrorResponse'
              examples:
                missing_number:
                  summary: Missing number
                  value:
                    timestamp: '2026-03-16T22:09:39.732Z'
                    status: 400
                    error: Missing Number
                    message: The 'number' is required in Post Body and cannot be empty.
                    path: /v1.0/phone/validation
                missing_region_information:
                  summary: Missing region information
                  value:
                    timestamp: '2026-03-16T22:10:03.974Z'
                    status: 400
                    error: Missing Region Information
                    message: Provide the region explicitly (e.g. 'US') or include a '+' with the country code.
                    path: /v1.0/phone/validation
                multiple_region_codes:
                  summary: Multiple region codes provided
                  value:
                    timestamp: '2026-03-16T22:10:10.112Z'
                    status: 400
                    error: Multiple Region Codes Provided
                    message: Only one of 'region' or 'dialer_region' can be provided. Do not use both in the same request.
                    path: /v1.0/phone/validation
                invalid_region_code:
                  summary: Invalid region code
                  value:
                    timestamp: '2026-03-16T22:10:15.072Z'
                    status: 400
                    error: Invalid Region Code
                    message: Region code must be a 2-letter ISO country code (e.g., 'US', 'GB').
                    path: /v1.0/phone/validation
                invalid_number_format:
                  summary: Invalid number format
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    status: 400
                    error: Invalid Number Format
                    message: The input does not match the expected structure of a phone number.
                    path: /v1.0/phone/validation
                number_too_short:
                  summary: Number too short
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    status: 400
                    error: Number Too Short
                    message: The number is too short after removing the international dialing prefix.
                    path: /v1.0/phone/validation
                too_short_national_number:
                  summary: Too short national number
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    status: 400
                    error: Too Short National Number
                    message: The national number part is shorter than allowed for valid phone numbers.
                    path: /v1.0/phone/validation
                number_too_long:
                  summary: Number too long
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    status: 400
                    error: Number Too Long
                    message: The phone number has more digits than any valid phone number can have.
                    path: /v1.0/phone/validation
        '405':
          description: Method Not Allowed – Wrong HTTP method used on the endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationErrorResponse'
              example:
                timestamp: '2026-06-06T14:00:00.000Z'
                path: /v1.0/phone/validation
                status: 405
                error: Method Not Allowed
                message: Wrong HTTP method was used on the endpoint.
        '408':
          description: Request Timeout – Timed out while connecting to the remote server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationErrorResponse'
              example:
                timestamp: '2026-06-06T14:00:00.000Z'
                path: /v1.0/phone/validation
                status: 408
                error: Request Timeout
                message: Timed out while connecting to the remote URL.
        '429':
          description: Rate Limit Exceeded – API rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationErrorResponse'
              example:
                timestamp: '2026-06-06T14:00:00.000Z'
                path: /v1.0/phone/validation
                status: 429
                error: Too Many Requests
                message: API rate limit exceeded.
      operationId: postPhoneValidation
      security:
      - ApiKeyAuth: []
  /v1.0/phone/validation/bulk:
    post:
      tags:
      - Phone Validation
      summary: Bulk validate phone numbers
      description: Validates up to 100 phone numbers in a single request. Each number is processed independently — invalid entries return per-number errors without affecting the rest of the batch.
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
        description: Specifies the desired format for the API response. Choose 'json' for a JSON object. If not provided, the API defaults to JSON format.
      requestBody:
        required: true
        description: 'Send a JSON object with a `numbers` array. Each item must have `number` and optionally `region` **or** `dialer_region` — never both at the same time.


          - **International format** (`+` prefix): provide `number` only.

          - **Local format** (no `+`): provide `number` + `region`.

          - **IDD format** (exit code): provide `number` + `dialer_region`.'
        content:
          application/json:
            schema:
              type: object
              required:
              - numbers
              properties:
                numbers:
                  type: array
                  description: Array of phone number objects. Maximum 100 per request.
                  maxItems: 100
                  items:
                    type: object
                    required:
                    - number
                    properties:
                      number:
                        type: string
                        description: Phone number to validate.
                      region:
                        type: string
                        description: Two-letter ISO country code. Required for local format numbers. Cannot be used together with dialer_region.
                      dialer_region:
                        type: string
                        description: Two-letter ISO country code of the dialing origin. Required for IDD format numbers. Cannot be used together with region.
            examples:
              international_format:
                summary: International format numbers (+ prefix) — no region needed
                value:
                  numbers:
                  - number: '+14155552671'
                  - number: '+447911123456'
                  - number: '+919876543210'
              local_format_with_region:
                summary: Local format numbers — use region (not dialer_region)
                value:
                  numbers:
                  - number: '03301112233'
                    region: PK
                  - number: 07911123456
                    region: GB
                  - number: 09876543210
                    region: IN
              mixed:
                summary: Mixed formats in one batch
                value:
                  numbers:
                  - number: '+14155552671'
                  - number: '03301112233'
                    region: PK
                  - number: '0014155552671'
                    dialer_region: AU
      responses:
        '200':
          description: Array of phone validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationBulkPhoneValidationResponse'
              example:
              - raw_input:
                  number: '+14155552671'
                possible: true
                valid: true
                country_prefix: 1
                national_number: 4155552671
                country_code: US
                location: San Francisco, CA
                time_zones:
                - America/Los_Angeles
                line_type: FIXED_LINE_OR_MOBILE
                formats:
                  E164: '+14155552671'
                  International: +1 415-555-2671
                  National: (415) 555-2671
                  RFC3966: tel:+1-415-555-2671
                area_code_length: 3
                ndc_length: 3
                can_be_internationally_dialled: true
              - raw_input:
                  number: '03301112233'
                  region: PK
                possible: true
                valid: true
                country_prefix: 92
                national_number: 3301112233
                country_code: PK
                carrier: Ufone
                location: Pakistan
                time_zones:
                - Asia/Karachi
                line_type: MOBILE
                formats:
                  E164: '+923301112233'
                  International: +92 330 1112233
                  National: 0330 1112233
                  RFC3966: tel:+92-330-1112233
                ndc_length: 3
                can_be_internationally_dialled: true
              - raw_input:
                  number: '0014155552671'
                  dialer_region: AU
                possible: false
                valid: false
        '400':
          description: Bad Request – e.g. missing required field or both region codes provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneValidationErrorResponse'
              examples:
                missing_numbers:
                  summary: Missing required field
                  value:
                    timestamp: '2026-03-16T22:07:42.176Z'
                    path: /v1.0/phone/validation/bulk
                    status: 400
                    error: Bad Request
                    message: The 'numbers' array is required in Post Body and cannot be empty.
                multiple_region_codes:
                  summary: Multiple region codes provided
                  value:
                    timestamp: '2026-03-16T22:07:42.176Z'
                    path: /v1.0/phone/validation/bulk
                    status: 400
                    error: Multiple Region Codes Provided
                    message: Provide only one region code, either 'region' or 'dialer_region', not both.
                missing_number_in_item:
                  summary: Missing number in item
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    path: /v1.0/phone/validation/bulk
                    status: 400
                    error: Invalid request body Exception
                    message: The 'number' is required in Post Body and cannot be empty.
                missing_region_information:
                  summary: Missing region information
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    path: /v1.0/phone/validation/bulk
                    status: 400
                    error: Invalid request body Exception
                    message: Provide the region explicitly (e.g. 'US') or include a '+' with the country code.
                invalid_number_format:
                  summary: Invalid number format
                  value:
                    timestamp: '2026-03-16T22:00:00.000Z'
                    path: /v1.0/phone/validation/bulk
