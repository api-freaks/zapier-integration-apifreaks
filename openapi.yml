          mandatory: false
          properties:
            calling_code:
              type: string
              description: Calling code/Dialing code of the country.
              mandatory: true
            tld:
              type: string
              description: Top Level Domain Name (TLD) of the country, which is also called ccTLD.
              mandatory: true
            languages:
              type: array
              items:
                type: string
              description: List of the languages’ codes, spoken in the country.
