  /v1.0/domain/availability:
    get:
      tags:
      - Domain
      summary: Check whether a domain is available for registration or not.
      description: The Domain Search API is designed to simplify the process of finding available domain names across all top-level domains (TLDs) and second-level domains (SLDs).
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response.
      - name: domain
        in: query
        required: true
        schema:
          type: string
        description: Domain name whose availability is to be checked.
      - name: source
        in: query
        required: false
        schema:
          type: string
          enum:
          - dns
          - whois
          default: dns
        description: Specify the data source for domain availability checks. Use "dns" for DNS-based lookups or "whois" for WHOIS-based lookups. By default, "dns" is used.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainDomainAvailabilityResponse'
              example:
                domain: google.com
                domainAvailability: false
        '400':
          description: Bad Request – Invalid domain parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    description: Timestamp of the error
                  path:
                    type: string
                    description: Request path
                  status:
                    type: integer
                    description: HTTP status code
                  error:
                    type: string
                    description: Error type
                  message:
                    type: string
                    description: Error message
              example:
                timestamp: '2025-08-14T10:37:02.237Z'
                status: 400
                error: Invalid Param Exception
                message: 'Please pass domain param correct value [For Technical Support: support@whoisfreaks.com]'
                path: /v1.0/domain/availability
        '403':
          description: Forbidden – Inactive TLD
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    description: Timestamp of the error
                  path:
                    type: string
                    description: Request path
                  status:
                    type: integer
                    description: HTTP status code
                  error:
                    type: string
                    description: Error type
                  message:
                    type: string
                    description: Error message
              examples:
                Not Supported Domain extension:
                  value:
                    timestamp: '2025-08-14T10:31:48.987Z'
                    status: 403
                    error: Not Supported Domain extension
                    message: We are not providing the whois of this domain extension(an)
                    path: /v1.0/domain/availability
                Inactive TLD:
                  value:
                    timestamp: '2025-08-14T10:32:42.257Z'
                    status: 403
                    error: Forbidden
                    message: 'Provided domain belongs to an inactive TLD. Please try to use historical whois lookup. [For Technical Support email at: support@whoisfreaks.com]'
                    path: /v1.0/domain/availability
        '408':
          description: Request Timeout – Unable to fetch WHOIS data
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    description: Timestamp of the error
                  path:
                    type: string
                    description: Request path
                  status:
                    type: integer
                    description: HTTP status code
                  error:
                    type: string
                    description: Error type
                  message:
                    type: string
                    description: Error message
              example:
                timestamp: '2025-08-14T10:37:21.871Z'
                status: 408
                error: Request Timeout
                message: 'Unable to fetch whois data. Please try again. [For Technical Support email at: support@whoisfreaks.com]'
                path: /v1.0/domain/availability
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    description: Timestamp of the error
                  path:
                    type: string
                    description: Request path
                  status:
                    type: integer
                    description: HTTP status code
                  error:
                    type: string
                    description: Error type
                  message:
                    type: string
                    description: Error message
              example:
                timestamp: '2025-08-14T10:37:02.237Z'
                status: 503
                error: Service Unavailable
                message: 'Service is unavailable. Please try after some time. [For Technical Support email at: support@whoisfreaks.com]'
                path: /v1.0/domain/availability
      security:
      - ApiKeyAuth: []
      operationId: getDomainAvailability
    post:
      tags:
      - Domain
      summary: Check the availability of multiple domains in a single request.
      description: Perform Bulk Domain Availability checks using a list of domains. Supports upto `100 Domains Per Request`.
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response.
      - name: source
        in: query
        required: false
        schema:
          type: string
          enum:
          - dns
          - whois
          default: dns
        description: Specify the data source for domain availability checks. Use "dns" for DNS-based lookups or "whois" for WHOIS-based lookups. By default, "dns" is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - domainNames
              properties:
                domainNames:
                  type: array
                  items:
                    type: string
                  description: List of domain names to check.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainBulkDomainSuggestionResponse'
              example:
                bulk_domain_availability_response:
                - domain: bannu.in
