        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - domainNames
              properties:
                domainNames:
                  type: array
                  description: List of hostnames to lookup DNS records for
                  maxItems: 100
                  items:
                    type: string
                ipAddresses:
                  type: array
                  description: Array of IP addresses to include in the lookup for enrichment
                  items:
                    type: string
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response.
      - name: type
        in: query
        required: true
        schema:
          type: string
        description: 'A comma-separated list of DNS record types for lookup.

          Possible values: A, AAAA, MX, NS, SOA, SPF, TXT, CNAME, or all

