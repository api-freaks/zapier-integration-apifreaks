  /v1.0/email-validation/bulk:
    post:
      tags:
      - Email Validation
      summary: Validate multiple email addresses
      description: Validates a bulk of email addresses and returns result for each. Maximum `100` email addresses per request.
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailData:
                  type: array
                  items:
                    type: object
                    required:
                    - email
                    properties:
                      email:
                        type: string
                        format: email
                        description: Email address to validate
                      name:
                        type: string
                        description: Name associated with the email address
                      ip:
                        type: string
                        description: IP address associated with the email address
                  description: Array of email objects for bulk validation
              required:
              - emailData
      responses:
        '200':
          description: Bulk of email validation results
          headers:
            X-Successful-Record:
