              type: boolean
              description: Indicates if the IP address is being consumed on a Tor endpoint.
              mandatory: true
            is_proxy:
              type: boolean
              description: Indicates whether the IP address is associated with any anonymization network —VPN, PROXY, or RELAY.
              mandatory: true
            proxy_type:
              type: string
