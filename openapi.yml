  /v1.0/ocr/predict:
    post:
      tags:
      - OCR
      summary: Extract text from images, PDFs, or ZIP archives using OCR
      description: "Perform Optical Character Recognition (OCR) on images, PDFs, or ZIP archives. Supports two models: `mini-ocr-v1` for CAPTCHA-optimized OCR and `ocr-v1` for general-purpose document text extraction. Supports zonal OCR to extract text from specific regions of an image.\n\n**Notes:**\n- The `zone` query parameter cannot be given with .pdf and .zip types as it can only be applied to single image query.\n- The `page_range` query parameter cannot be given in any other type except .pdf types.\n- PDFs containing images in them are allowed only for processing.\n- The `mini-ocr-v1` model doesn’t support the following query parameters:\n    - `page_range` (.pdf types)\n    - `zone`\n"
      operationId: ocrPredict
      security:
      - ApiKeyAuth: []
      parameters:
      - name: url
        in: query
        required: false
        description: URL of the image or PDF (required if `file` not provided)
        schema:
          type: string
      - name: model
        in: query
        required: true
        description: OCR model to use.
        schema:
          type: string
          enum:
          - mini-ocr-v1
          - ocr-v1
      - name: page_range
        in: query
        required: false
        description: Specify page range for multi-page PDFs (e.g., '1,3,5-10' or 'allpages'). **Note:** This parameter can only be used with .pdf file types.
        schema:
          type: string
      - name: zone
        in: query
        required: false
        description: Define OCR zones using coordinates (top:left:height:width). Multiple zones can be defined using commas. Only available for model 'ocr-v1'. **Note:** This parameter cannot be used with .pdf and .zip file types as it can only be applied to single image queries.
        schema:
          type: string
      - name: new_line
        in: query
        required: false
        description: 'Set to 1 to split output text into individual lines (default: 0)'
        schema:
          type: integer
          enum:
          - 0
          - 1
          default: 0
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 'Image, PDF, or ZIP file for OCR (required if `url` not provided). Supported formats: .png, .jpg, .jpeg, .bmp, .tiff, .gif, .pcx, .pdf, .zip. **Note:** PDFs containing images in them are allowed only for processing.'
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: URL of the image or PDF (required if `file` not provided)
                model:
                  type: string
                  enum:
                  - mini-ocr-v1
                  - ocr-v1
                  description: OCR model to use. `mini-ocr-v1` for CAPTCHA OCR, `ocr-v1` for general OCR
                page_range:
                  type: string
                  description: Specify page range for multi-page PDFs (e.g., '1,3,5-10' or 'allpages'). **Note:** This parameter can only be used with .pdf file types.
                zone:
                  type: string
                  description: Define OCR zones using coordinates (top:left:height:width). Multiple zones can be defined using commas. Only available for model 'ocr-v1'. **Note:** This parameter cannot be used with .pdf and .zip file types as it can only be applied to single image queries.
                new_line:
                  type: integer
                  enum:
                  - 0
                  - 1
                  default: 0
                  description: 'Set to 1 to split output text into individual lines (default: 0)'
              required:
              - model
      responses:
        '200':
          description: Successful OCR response
          content:
            application/json:
              schema:
                type: object
                properties:
                  OCRText:
                    description: 'Array containing extracted text. Structure varies based on input type and new_line parameter:

                      - Single file, new_line=0: Array with single string element

                      - Single file, new_line=1: Array of strings (one per line)

                      - Bulk/ZIP file, new_line=0: Array of strings (one per file)

                      - Bulk/ZIP file, new_line=1: Array of arrays (each inner array contains lines for respective file)'
                    oneOf:
                    - type: array
                      items:
                        type: string
                    - type: array
                      items:
                        type: array
                        items:
                          type: string
                required:
                - OCRText
              examples:
                singleFileNoNewLine:
                  summary: Single file, new_line=0
                  value:
                    OCRText:
                    - Extracted text from the image or document
                singleFileWithNewLine:
                  summary: Single file, new_line=1
                  value:
                    OCRText:
                    - Line 1 of extracted text
                    - Line 2 of extracted text
                    - Line 3 of extracted text
                bulkZipNoNewLine:
                  summary: Bulk/ZIP file, new_line=0
                  value:
                    OCRText:
                    - Text extracted from file 1
                    - Text extracted from file 2
                    - Text extracted from file 3
                bulkZipWithNewLine:
                  summary: Bulk/ZIP file, new_line=1
                  value:
                    OCRText:
                    - - Line 1 of file 1
                      - Line 2 of file 1
                      - Line 3 of file 1
                    - - Line 1 of file 2
                      - Line 2 of file 2
