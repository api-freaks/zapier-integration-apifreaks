  /v1.0/domain/dns/reverse:
    get:
      tags:
      - DNS
      summary: Retrieve all the hostnames associated with any particular A, AAAA, MX, NS, SOA, SPF, TXT, and CNAME DNS records.
      description: 'Retrieve all the hostnames associated with any particular A, AAAA, MX, NS, SOA, SPF, TXT, and CNAME DNS records. For instance, you can access all the hostnames hosted on any IP/CIDR notation, all the domain names using Cloudflare name servers, and all the domain names using Google Mailbox

        '
      operationId: reverseDnsLookup
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response.
      - name: type
        in: query
        required: true
        schema:
          type: string
          enum:
          - A
          - AAAA
          - MX
          - NS
          - SOA
          - SPF
          - TXT
          - CNAME
        description: 'The type of reverse DNS lookup to perform. Determines how the value parameter is interpreted:

          - A: IPv4 CIDR block

          - AAAA: IPv6 CIDR block

          - MX: Mail provider domain

          - NS: Name server provider hostname

          - SOA: SOA record admin domain

          - SPF/TXT: Target verification strings

          - CNAME: Target hostname

          '
      - name: value
        in: query
        required: true
        schema:
          type: string
        description: Provide an IP or CIDR for A/AAAA lookups, or a hostname/selector for MX, NS, SOA, SPF, TXT, and CNAME queries. Wildcard regex patterns are also supported (e.g., mail.google.com, m*.google.com, _spf.g*.com, s*.g*.com).
      - name: exact
        in: query
        required: false
        schema:
          type: boolean
          default: 'false'
        description: Accepts 'true' or 'false'. "true" returns only records that exactly match the input (NS, MX, CNAME, SOA, SPF, TXT). "false" returns all matches (default when omitted).
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number to paginate through results (defaults to 1).
      responses:
        '200':
          description: Successful Response
          content:
