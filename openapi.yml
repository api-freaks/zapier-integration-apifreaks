              type: string
              description: Name of the continent.
              mandatory: true
            country_code2:
              type: string
              description: Country code (ISO 3166-1 alpha-2) of the country.
              mandatory: true
            country_code3:
              type: string
              description: Country code (ISO 3166-1 alpha-3) of the country.
              mandatory: true
            country_name:
              type: string
              description: Name of the country.
              mandatory: true
            country_name_official:
              type: string
              description: Official name (ISO 3166) of the country.
              mandatory: true
            country_capital:
              type: string
              description: Name of the country’s capital.
              mandatory: true
            state_prov:
              type: string
              description: Name of the state/province/region.
              mandatory: false
            state_code:
              type: string
              description: Code of the state/province/region.
              mandatory: false
            district:
              type: string
              description: Name of the district or county.
              mandatory: false
            city:
              type: string
              description: Name of the city.
              mandatory: false
            locality:
              type: string
              description: A more specific area in city or it can be same as city.
              mandatory: false
            accuracy_radius:
              type: string
              description: Circular radius in Km, where the IP address location can be found.
              mandatory: false
            dma_code:
              type: string
              description: Representing Designated Market Area (DMA) code specifically used in the United States for media marketing.
              mandatory: false
              nullable: true
            zipcode:
              type: string
              description: ZIP/Postal code of the place.
              mandatory: false
            latitude:
              type: string
              description: Latitude of the place.
              mandatory: true
            longitude:
              type: string
              description: Longitude of the place.
              mandatory: true
            is_eu:
              type: boolean
              description: Is the country belong to European Union?
              mandatory: true
            country_flag:
              type: string
              format: uri
