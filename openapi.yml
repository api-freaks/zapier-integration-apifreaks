  /v1.0/geocoder/search:
    get:
      tags:
      - Geocoding
      summary: Forward geocoding (address to coordinates)
      description: Convert a given address or place name into geographic coordinates (latitude and longitude).
      parameters:
      - name: query
        in: query
        required: true
        schema:
          type: string
        description: Free-form search query, e.g. Wembley Stadium, London
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 40
          default: 1
        description: Max number of results to return (1–40). May return fewer if matches are weak.
      - name: Accept-Language
        in: header
        required: false
        schema:
          type: string
        description: Preferred language order for showing search results. This may either be a simple comma-separated list of language codes or a single entry. The results will be in the 1st language which is matched from the header. As a fallback if the results are not supported in the given language, 'en' will be used.
      - name: min_lat
        in: query
        required: false
        schema:
          type: number
          format: float
          minimum: -90
          maximum: 90
        description: Minimum latitude for the viewbox. Must be ≤ max_lat and between -90 and 90.
      - name: max_lat
        in: query
        required: false
        schema:
          type: number
          format: float
          minimum: -90
          maximum: 90
        description: Maximum latitude for the viewbox. Must be ≥ min_lat and between -90 and 90.
      - name: min_lon
        in: query
        required: false
        schema:
          type: number
          format: float
          minimum: -180
          maximum: 180
        description: Minimum longitude for the viewbox. Must be ≤ max_lon and between -180 and 180.
      - name: max_lon
        in: query
        required: false
        schema:
          type: number
          format: float
          minimum: -180
          maximum: 180
        description: Maximum longitude for the viewbox. Must be ≥ min_lon and between -180 and 180.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodingForwardGeocoderResponse'
              example:
              - lat: 48.8566
                lon: 2.3522
                name: Paris
                category: place
                type: city
                street: Rue de Rivoli
                area: Arrondissement 1
                postcode: '75001'
                city: Paris
                county: Paris
                state_code: IDF
                state: Île-de-France
                country_code: FR
                country: France
                full_address: Rue de Rivoli, 75001 Paris, France
                bounding_box:
                - '48.8099'
                - '48.9033'
                - '2.2916'
                - '2.4323'
                poi:
                - name: Eiffel Tower
                  category: amenity
                  type: attraction
        '400':
          description: Bad Request – one or more parameters are invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Detailed error message
              examples:
                InvalidParameters:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Param Exception
                    message: Please provide valid parameters.
                InvalidLimit:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Param Exception
                    message: Please provide a valid limit. Valid range is from 1 to 40.
                InvalidQueryString:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Param Exception
                    message: Please provide a valid query string.
                InvalidLatitude:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Latitude Provided
                    message: Latitude must be between -90 and 90.
                InvalidLongitude:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Longitude Provided
                    message: Longitude must be between -180 and 180.
                InvalidViewboxLatitude:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Latitude Provided
                    message: Minimum latitude cannot be greater than maximum latitude in the viewbox.
                InvalidViewboxLongitude:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Longitude Provided
                    message: Minimum longitude cannot be greater than maximum longitude in the viewbox.
                MissingViewboxParams:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 400
                    error: Invalid Param Exception
                    message: 'Please provide all four viewbox parameters: min_lat, min_lon, max_lat, max_lon.'
        '401':
          description: Unauthorized
          content:
            application/json:
              examples:
                Unauthorized:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 401
                    error: API Access Exception
                    message: 'Provided API key is invalid. [For Technical Support: support@apifreaks.com]'
        '404':
          description: Not Found
          content:
            application/json:
              examples:
                ResultNotFound:
                  value:
                    timestamp: '2025-09-24T11:08:11.615Z'
                    path: /v1.0/geocoder/search
                    status: 404
                    error: No Result Found
                    message: No results found for the given query.
        '500':
          description: Internal Server Error
          content:
            application/json:
              examples:
                ServerError:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 500
                    error: Server Error
                    message: An unexpected error occurred while processing the request.
        '504':
          description: Gateway Timeout
          content:
            application/json:
              examples:
                Timeout:
                  value:
                    timestamp: '2025-09-24T11:08:43.342Z'
                    path: /v1.0/geocoder/search
                    status: 504
                    error: Gateway Timeout
                    message: This request exceeded the processing limit. Please try again later.
      security:
      - ApiKeyAuth: []
      operationId: getGeocoderSearch
