      operationId: readability_score
      security:
      - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-apiKey
  schemas:
    CommodityLiveCommodityPricesResponse:
      type: object
      required:
      - success
      - timestamp
      - rates
      - metadata
      properties:
        success:
          type: boolean
          description: '`true` for successful requests.'
        timestamp:
          type: integer
          description: Unix timestamp indicating when the response was generated.
        rates:
          type: object
          description: Map of commodity symbols to their current price.
          additionalProperties:
            type: number
        metadata:
          type: object
          description: Map of commodity symbols to their unit and quote metadata.
          additionalProperties:
            type: object
            required:
            - unit
            - quote
            properties:
              unit:
                type: string
                description: Unit of measurement for the commodity (e.g., `Bbl`, `T.oz`).
              quote:
                type: string
                description: Quote currency used for the commodity price.
    CommodityHistoricalCommodityPricesResponse:
      type: object
      required:
      - success
      - date
      - rates
      properties:
        success:
          type: boolean
          description: '`true` for successful requests.'
        date:
          type: string
          description: Date for which prices were fetched (YYYY-MM-DD).
        rates:
          type: object
          description: Map of commodity symbols to their OHLC price data.
          additionalProperties:
            type: object
            required:
            - date
            - open
            - high
            - low
            - close
            properties:
              date:
                type: string
                description: Date for which prices were fetched (YYYY-MM-DD).
              open:
                type: number
                description: Opening price on the given date.
              high:
                type: number
                description: Highest price recorded on the given date.
              low:
                type: number
                description: Lowest price recorded on the given date.
              close:
                type: number
                description: Closing price on the given date.
    CommodityCommodityTimeSeriesResponse:
      type: object
      required:
      - success
      - startDate
      - endDate
      - rates
      properties:
        success:
          type: boolean
          description: '`true` for successful requests.'
        startDate:
          type: string
          description: Start date of the time series (YYYY-MM-DD).
        endDate:
          type: string
          description: End date of the time series (YYYY-MM-DD).
        rates:
          type: object
          description: Date-indexed map of commodity OHLC data.
          additionalProperties:
            type: object
            description: Map of commodity symbols to their OHLC data for that date.
            additionalProperties:
              type: object
              required:
              - open
              - high
              - low
              - close
              properties:
                open:
                  type: number
                  description: Opening price on the given date.
                high:
                  type: number
                  description: Highest price on the given date.
                low:
                  type: number
                  description: Lowest price on the given date.
                close:
                  type: number
                  description: Closing price on the given date.
    CommodityCommodityFluctuationResponse:
      type: object
      required:
      - success
      - startDate
      - endDate
      - rates
      properties:
        success:
          type: boolean
          description: '`true` for successful requests.'
        startDate:
          type: string
          description: Start date of the interval (YYYY-MM-DD).
        endDate:
          type: string
          description: End date of the interval (YYYY-MM-DD).
        rates:
          type: object
          description: Map of commodity symbols to their fluctuation metrics.
          additionalProperties:
            type: object
            required:
            - startRate
            - endRate
            - change
            - changePercent
            properties:
              startRate:
                type: number
                description: Price of the commodity on the start date.
              endRate:
                type: number
                description: Price of the commodity on the end date.
              change:
                type: number
                description: Absolute price difference between end and start dates.
              changePercent:
                type: number
                description: Percentage price change from start to end date.
    CommodityCommoditySymbolsResponse:
      type: object
      required:
      - success
      - symbols
      properties:
        success:
          type: boolean
          description: Indicates whether the API request was successful.
        symbols:
          type: array
          description: Array of commodity symbol objects with metadata.
          items:
            type: object
            required:
            - symbol
            - name
            - category
            - status
            - updateInterval
            - currency
            - unit
            properties:
              symbol:
                type: string
                description: Unique identifier/ticker symbol for the commodity.
              name:
                type: string
                description: Full name of the commodity.
              category:
                type: string
                description: Category the commodity belongs to (e.g., `Metals`, `Energy`).
              status:
                type: string
                description: 'Current status of the commodity. Value: `active`.'
              updateInterval:
                type: string
                description: 'Rate at which the price is updated. Values: `PER_SECOND`, `PER_MINUTE`.'
              currency:
                type: object
                required:
                - code
                - name
                - symbol
                properties:
                  code:
                    type: string
                    description: ISO 4217 currency code.
                  name:
                    type: string
                    description: Full name of the currency.
                  symbol:
                    type: string
                    description: Symbol of the currency.
              unit:
                type: object
                required:
                - symbol
                - name
                properties:
                  symbol:
                    type: string
                    description: Abbreviated unit symbol (e.g., `T.oz`).
                  name:
                    type: string
                    description: Full name of the unit of measurement.
    CommodityErrorResponse:
      type: object
      required:
      - timestamp
      - status
      - error
      - message
      - path
      properties:
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the error occurred.
        status:
          type: integer
          description: HTTP status code returned with the error.
        error:
          type: string
          description: Specific error type (e.g., `SYMBOL_NOT_FOUND`, `VALIDATION_ERROR`).
        message:
          type: string
          description: Human-readable error message describing the failure.
        path:
          type: string
          description: API endpoint path that produced the error.
    CurrencyLatestExchangeRatesResponse:
      type: object
      required:
      - date
      - base
      - rates
      properties:
        date:
          type: string
          description: Date and time with timezone (UTC) when the rates were recorded.
        base:
          type: string
          description: Base currency used for calculating exchange rates.
        rates:
          type: object
          additionalProperties:
            type: string
          description: Map of currency codes to their exchange rate string against the base currency.
    CurrencyHistoricalExchangeRatesResponse:
      $ref: '#/components/schemas/CurrencyLatestExchangeRatesResponse'
    CurrencyLatestCurrencyConverterResponse:
      type: object
      required:
      - date
      - from
      - to
      - rate
      - givenAmount
      - convertedAmount
      properties:
        date:
          type: string
          description: Date and time with timezone (UTC) when the rate was recorded.
        from:
          type: string
          description: Source currency code.
        to:
          type: string
          description: Target currency code.
        rate:
          type: string
          description: Conversion rate from source to target currency.
        givenAmount:
          type: string
          description: The amount provided for conversion.
        convertedAmount:
          type: string
          description: The converted amount in the target currency.
    CurrencyHistoricalCurrencyConverterResponse:
      $ref: '#/components/schemas/CurrencyLatestCurrencyConverterResponse'
    CurrencyCurrencyTimeseriesResponse:
      type: object
      required:
      - startDate
      - endDate
      - base
      - historicalRatesList
      properties:
        startDate:
          type: string
          description: Start date of the interval (YYYY-MM-DD).
        endDate:
          type: string
          description: End date of the interval (YYYY-MM-DD).
        base:
          type: string
          description: Base currency used for all rates in the series.
        historicalRatesList:
          type: array
          description: Array of daily rate objects within the specified interval.
          items:
            type: object
            required:
            - date
            - rates
            properties:
              date:
                type: string
                description: Date within the interval (YYYY-MM-DD).
              rates:
                type: object
                additionalProperties:
                  type: string
                description: Map of currency codes to exchange rate strings for that date.
    CurrencyCurrencyFluctuationResponse:
      type: object
      required:
      - startDate
      - endDate
      - base
      - rateFluctuations
      properties:
        startDate:
          type: string
          description: Start date of the interval (YYYY-MM-DD).
        endDate:
          type: string
          description: End date of the interval (YYYY-MM-DD).
        base:
          type: string
          description: Base currency used for all fluctuations.
        rateFluctuations:
          type: object
          description: Map of currency codes to their fluctuation details.
          additionalProperties:
            type: object
            required:
            - startRate
            - endRate
            - change
            - percentChange
            properties:
              startRate:
                type: string
                description: Rate of the currency at the start of the interval.
              endRate:
                type: string
                description: Rate of the currency at the end of the interval.
              change:
                type: string
                description: Absolute change between start and end rate. Can be positive or negative.
              percentChange:
                type: string
                description: Percentage change between start and end rate. Can be positive or negative.
    CurrencyGeolocalizedCurrencyConverterResponse:
      type: object
      required:
      - date
      - from
      - to
      - rate
      - ipAddress
      - givenAmount
      - convertedAmount
      properties:
        date:
          type: string
          description: Date and time with timezone (UTC) when the rate was recorded.
        from:
          type: string
          description: Source currency code.
        to:
          type: string
          description: Target currency code — the local currency of the IP.
        rate:
          type: string
          description: Exchange rate from source to target currency.
        ipAddress:
          type: string
          description: IP address used for geolocation.
        givenAmount:
          type: string
          description: Amount provided for conversion.
        convertedAmount:
          type: string
          description: Converted amount in the target (local) currency.
    CurrencySupportedCurrenciesResponse:
      type: object
      required:
      - supportedCurrenciesMap
      properties:
        supportedCurrenciesMap:
          type: object
          description: Map of all supported currencies keyed by currency code.
          additionalProperties:
            type: object
            required:
            - currencyCode
            - currencyName
            - countryCode
            - countryName
            - status
            - availableFrom
            - availableUntil
            - icon
            properties:
              currencyCode:
                type: string
                description: Unique currency code (e.g., `USD`, `BTC`, `XAU`).
              currencyName:
                type: string
                description: Full name of the currency.
              countryCode:
                type: string
                description: 'ISO 3166-1 alpha-2 country code. For crypto: `Crypto`. For metals: `Metal`.'
              countryName:
                type: string
                description: 'Country name. For crypto: `Global`. For metals: `Precious Metal`.'
              status:
                type: string
                description: 'Availability status: `AVAILABLE` or `DEPRECIATED`.'
              availableFrom:
                type: string
                description: Date the currency became available (YYYY-MM-DD).
              availableUntil:
                type: string
                description: Date the currency is or was available (YYYY-MM-DD).
              icon:
                type: string
                description: URL of the currency icon/flag image.
    CurrencyCurrencySymbolsResponse:
      type: object
      required:
      - currencySymbols
      properties:
        currencySymbols:
          type: object
          description: Map of all currency codes to their full names.
          additionalProperties:
            type: string
    CurrencyHistoricalDataLimitsResponse:
      type: object
      required:
      - availabilityPeriod
      properties:
        availabilityPeriod:
          type: object
          description: Map of all currency codes to their historical data availability range.
          additionalProperties:
            type: string
            description: Date range in `YYYY-MM-DD to YYYY-MM-DD` format.
    CurrencyErrorResponse:
      type: object
      required:
      - timestamp
      - status
      - error
      - message
      - path
      properties:
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the error occurred.
        status:
          type: integer
          description: HTTP status code returned with the error.
        error:
          type: string
          description: Specific error type (e.g., `Invalid Param Exception`, `Not Found Exception`).
        message:
          type: string
          description: Human-readable error message describing the failure.
        path:
          type: string
          description: API endpoint path that produced the error.
    DnsDNSLookupResponse:
      type: object
      required:
      - status
      - queryTime
      - domainName
      - domainRegistered
      - dnsTypes
      - dnsRecords
      properties:
        status:
          type: boolean
          description: Indicates whether the query was processed successfully.
        queryTime:
          type: string
          format: date-time
          description: Time at which the query was made (Format:YYYY-MM-DD HH:mm:ss).
        domainName:
          type: string
          description: Queried domain.
        domainRegistered:
          type: boolean
          description: Indicates whether the domain is registered.
        dnsTypes:
          type: object
          properties:
            A:
              type: number
            AAAA:
              type: number
            MX:
              type: number
            NS:
              type: number
            SOA:
              type: number
            TXT:
              type: number
            SPF:
              type: number
        dnsRecords:
          type: array
          description: List of DNS records, each based on its type.
          items:
            oneOf:
            - $ref: '#/components/schemas/DnsAorAAAARecord'
            - $ref: '#/components/schemas/DnsCNAMERecord'
            - $ref: '#/components/schemas/DnsMXRecord'
            - $ref: '#/components/schemas/DnsNSRecord'
            - $ref: '#/components/schemas/DnsSOARecord'
            - $ref: '#/components/schemas/DnsTXTRecord'
    DnsHistoricalDnsResponse:
      type: object
      required:
      - queryTime
      - domainName
      - dnsTypes
      - dnsRecords
      properties:
        queryTime:
          type: string
          description: 'Date when the DNS snapshot was taken. (Format: YYYY-MM-DD)'
        domainName:
          type: string
          description: Queried domain name with trailing dot.
        dnsTypes:
          type: object
          properties:
            A:
              type: number
            AAAA:
              type: number
            MX:
              type: number
            NS:
              type: number
            SOA:
              type: number
            TXT:
              type: number
            SPF:
              type: number
        dnsRecords:
          type: array
          items:
            oneOf:
            - $ref: '#/components/schemas/DnsAorAAAARecord'
            - $ref: '#/components/schemas/DnsCNAMERecord'
            - $ref: '#/components/schemas/DnsMXRecord'
            - $ref: '#/components/schemas/DnsNSRecord'
            - $ref: '#/components/schemas/DnsSOARecord'
            - $ref: '#/components/schemas/DnsTXTRecord'
    DnsReverseDnsResponse:
      type: object
      required:
      - totalRecords
      - totalPages
      - currentPage
      - reverseDnsRecords
      properties:
        totalRecords:
          type: integer
        totalPages:
          type: integer
        currentPage:
          type: integer
        reverseDnsRecords:
          type: array
          items:
            type: object
            required:
            - queryTime
            - domainName
            - dnsTypes
            - dnsRecords
            properties:
              queryTime:
                type: string
                format: date-time
              domainName:
                type: string
              domainRegistered:
                type: boolean
              dnsTypes:
                type: object
                properties:
                  A:
                    type: number
                  AAAA:
                    type: number
                  CNAME:
                    type: number
                  MX:
                    type: number
                  NS:
                    type: number
                  SOA:
                    type: number
                  TXT:
                    type: number
                  SPF:
                    type: number
              dnsRecords:
                type: array
                items:
                  oneOf:
                  - $ref: '#/components/schemas/DnsAorAAAARecord'
                  - $ref: '#/components/schemas/DnsCNAMERecord'
                  - $ref: '#/components/schemas/DnsMXRecord'
                  - $ref: '#/components/schemas/DnsNSRecord'
                  - $ref: '#/components/schemas/DnsSOARecord'
                  - $ref: '#/components/schemas/DnsTXTRecord'
    DnsBulkDNSLookupResponse:
      type: object
      required:
      - bulk_dns_info
      properties:
        bulk_dns_info:
          type: array
          items:
            type: object
            properties:
              status:
                type: boolean
                description: Indicates whether the query was processed successfully
              queryTime:
                type: string
                description: 'Time at which the query was made (Format: YYYY-MM-DD HH:mm:ss)'
              domainName:
                type: string
                description: Queried domain (present for domain lookups)
              domainRegistered:
                type: boolean
                description: Indicates whether the domain is registered (present for domain lookups)
              ipAddress:
                type: string
                description: IP address queried (present for IP lookups)
              dnsTypes:
                type: object
                properties:
                  A:
                    type: number
                  AAAA:
                    type: number
                  MX:
                    type: number
                  NS:
                    type: number
                  SOA:
                    type: number
                  TXT:
                    type: number
                  SPF:
                    type: number
                  PTR:
                    type: number
              dnsRecords:
                type: array
                items:
                  oneOf:
                  - $ref: '#/components/schemas/DnsAorAAAARecord'
                  - $ref: '#/components/schemas/DnsCNAMERecord'
                  - $ref: '#/components/schemas/DnsMXRecord'
                  - $ref: '#/components/schemas/DnsNSRecord'
                  - $ref: '#/components/schemas/DnsSOARecord'
                  - $ref: '#/components/schemas/DnsTXTRecord'
    DnsAorAAAARecord:
      type: object
      required:
      - name
      - type
      - dnsType
      - ttl
      - rawText
      - rRsetType
      - address
      properties:
        name:
          type: string
          description: Name of the queried domain
        type:
          type: integer
          description: DNS type code (e.g., 1 for A, 28 for AAAA)
        dnsType:
          type: string
          enum:
          - A
          - AAAA
          description: DNS type as a string (e.g., "A", "AAAA")
        ttl:
          type: integer
          description: Time to live in seconds
        rawText:
          type: string
          description: Raw (un-parsed) DNS record text
        rRsetType:
          type: integer
          description: Indicates the resource record set type
        address:
          type: string
          description: IPv4 or IPv6 address for A or AAAA records respectively
      title: A / AAAA Record
    DnsCNAMERecord:
      type: object
      required:
      - name
      - type
      - dnsType
      - ttl
      - rawText
      - rRsetType
      - target
      properties:
        name:
          type: string
          description: Name of the queried domain
        type:
          type: integer
          description: DNS type code (5 for CNAME)
        dnsType:
          type: string
          enum:
          - CNAME
          description: DNS type as a string ("CNAME")
        ttl:
          type: integer
          description: Time to live in seconds
        rawText:
          type: string
          description: Raw (un-parsed) DNS record text
        rRsetType:
          type: integer
          description: Indicates the resource record set type
        target:
          type: string
          description: Host to which this domain points
      title: CNAME Record
    DnsMXRecord:
      type: object
      required:
      - name
      - type
      - dnsType
      - ttl
      - rawText
      - rRsetType
      - target
      - priority
      properties:
        name:
          type: string
          description: Name of the queried domain
        type:
          type: integer
          description: DNS type code (15 for MX)
        dnsType:
          type: string
          enum:
          - MX
          description: DNS type as a string ("MX")
        ttl:
          type: integer
          description: Time to live in seconds
        rawText:
          type: string
          description: Raw (un-parsed) DNS record text
        rRsetType:
          type: integer
          description: Indicates the resource record set type
        target:
          type: string
          description: Targeted mail service provider
        priority:
          type: integer
