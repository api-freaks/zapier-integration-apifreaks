  /v1.0/domain/dns/history:
    get:
      tags:
      - DNS
      summary: Get all historical A, AAAA, MX, NS, SOA, SPF, TXT, and CNAME DNS records of a hostname
      description: 'Retrieve historical DNS records for any hostname. Access unique historical data for A, AAAA, MX, NS, SOA, SPF, TXT, and CNAME records,

        including subdomains. Results are paginated with up to 100 unique records per page.

        '
      operationId: dnsHistoryLookup
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - json
          - xml
        description: Format of the response.
      - name: host-name
        in: query
        required: true
        schema:
          type: string
        description: Hostname or URL whose historical DNS records are required
      - name: type
        in: query
        required: true
        schema:
          type: string
        description: 'A comma-separated list of DNS record types for lookup.

          Possible values: A, AAAA, MX, NS, SOA, SPF, TXT, CNAME, or all

          '
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number for paginated results
      responses:
        '200':
          description: Successful DNS history lookup response
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalPages:
                    type: integer
                  currentPage:
                    type: integer
                  totalRecords:
                    type: integer
                  historicalDnsRecords:
                    type: array
                    items:
                      type: object
                      required:
                      - queryTime
                      - domainName
                      - dnsTypes
                      - dnsRecords
                      properties:
                        queryTime:
                          type: string
                          description: 'Date when the DNS snapshot was taken. (Format: YYYY-MM-DD)'
                        domainName:
                          type: string
                          description: Queried domain name with trailing dot.
                        dnsTypes:
                          type: object
                          properties:
                            A:
                              type: number
                            AAAA:
                              type: number
                            MX:
                              type: number
                            NS:
                              type: number
                            SOA:
                              type: number
                            TXT:
                              type: number
                            SPF:
                              type: number
                        dnsRecords:
                          type: array
                          items:
                            oneOf:
                            - $ref: '#/components/schemas/DnsAorAAAARecord'
                            - $ref: '#/components/schemas/DnsCNAMERecord'
                            - $ref: '#/components/schemas/DnsMXRecord'
                            - $ref: '#/components/schemas/DnsNSRecord'
                            - $ref: '#/components/schemas/DnsSOARecord'
                            - $ref: '#/components/schemas/DnsTXTRecord'
                required:
                - totalRecords
                - totalPages
                - currentPage
                - historicalDnsRecords
